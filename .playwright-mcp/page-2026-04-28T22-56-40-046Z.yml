          - heading "git add y git commit" [level=1] [ref=e55]
          - generic [ref=e56]:
            - paragraph [ref=e57]: "Ya tienes un repositorio inicializado y dos archivos en la carpeta de trabajo. Toca dar el siguiente paso: tomar la primera foto."
            - paragraph [ref=e58]: "Hacerlo son dos movimientos. Primero `git add <archivo>` sube ese archivo a la mesa de revisión (staging). Luego `git commit -m \"mensaje\"` toma la foto de todo lo que esté en la mesa y lo guarda con un mensaje corto que describe el cambio."
            - paragraph [ref=e59]: "El mensaje del commit es importante: tu yo del futuro va a leerlo cuando quiera entender por qué hiciste algo. Sé concreto, en presente, en una sola línea: 'añade saludo inicial', 'arregla cálculo del total', 'limpia estilos del header'."
