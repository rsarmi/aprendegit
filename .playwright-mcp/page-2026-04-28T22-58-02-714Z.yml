          - generic [ref=e56]:
            - paragraph [ref=e57]: "Que tu rama esté en el remoto no quiere decir que esté aceptada. Sigue siendo una propuesta. El siguiente paso es pedir formalmente que se incorpore a `main`. A esa petición se le llama Pull Request (o Merge Request, según la plataforma)."
            - paragraph [ref=e58]: "Un PR es una conversación alrededor de un cambio. Tú propones unir `feature/saludo` en `main`, escribes un título y una descripción de qué hiciste y por qué. Otra persona lo revisa, comenta, sugiere ajustes. Cuando hay luz verde, alguien pulsa Merge y la rama se funde con `main`."
            - paragraph [ref=e59]: "Un buen título es corto y describe el cambio en presente: 'Mejora el saludo del usuario'. La descripción explica el contexto: qué cambió, por qué, cómo probarlo. No es burocracia: es un favor enorme a quien va a revisar tu código."
